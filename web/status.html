<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حالة النظام - THOUESA</title>
    <link rel="stylesheet" href="/web/css/style.css">
    <link rel="stylesheet" href="/web/css/fire-steel.css">
    <style>
        .status-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
        }
        .status-ok { background: #4caf50; box-shadow: 0 0 10px #4caf50; }
        .status-error { background: #f44336; box-shadow: 0 0 10px #f44336; }
    </style>
</head>
<body class="dark-theme">
    <div class="container" style="max-width: 800px; margin-top: 50px;">
        <div class="text-center" style="margin-bottom: 40px;">
            <img id="site-logo" data-logo src="/web/assets/logo/logo.png" alt="logo" style="height: 80px; margin-bottom: 20px;">
            <h1 id="site-name">THOUESA</h1>
            <p class="text-muted">حالة النظام والخدمات</p>
        </div>

        <div id="health-status" class="status-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>حالة السيرفر</h3>
                <div id="server-indicator" class="status-indicator status-ok"></div>
            </div>
            <p id="server-msg">جاري الفحص...</p>
        </div>

        <div id="db-status" class="status-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>قاعدة البيانات</h3>
                <div id="db-indicator" class="status-indicator status-ok"></div>
            </div>
            <p id="db-msg">جاري الفحص...</p>
        </div>

        <div class="text-center">
            <a href="/" class="btn btn-glass">العودة للرئيسية</a>
        </div>
    </div>

    <script type="module">
        import { SITE_CONFIG } from '/web/config/siteConfig.js';
        window.SITE_CONFIG = SITE_CONFIG;
    </script>
    <script type="module" src="/web/js/site-init.js"></script>
    <script src="/web/js/status-inline.js"></script>
</body>
</html>
